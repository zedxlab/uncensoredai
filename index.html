<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZedCore — Uncensored AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0F2027;
    --mid: #1a3040;
    --green: #28623A;
    --green-light: #3a7a4e;
    --green-dim: #1e4a2c;
    --bg: #0c1c22;
    --surface: rgba(15,32,39,0.85);
    --surface2: rgba(40,98,58,0.15);
    --text: #d4ead9;
    --text-dim: #7aab87;
    --text-muted: #4a7558;
    --border: rgba(40,98,58,0.35);
    --border-bright: rgba(40,98,58,0.7);
    --glow: rgba(40,98,58,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* bg texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(40,98,58,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(15,32,39,0.9) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* subtle grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(40,98,58,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(40,98,58,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(12,28,34,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--green), var(--dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border-bright);
    box-shadow: 0 0 12px var(--glow);
  }

  .logo-icon i {
    color: var(--text);
    font-size: 16px;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-name {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 14px 20px 0;
    gap: 8px;
    background: rgba(12,28,34,0.6);
  }

  .tab {
    flex: 1;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab.active {
    background: var(--surface2);
    border-color: var(--border-bright);
    color: var(--text);
  }

  .tab i { font-size: 13px; }

  /* ── PANELS ── */
  .panel {
    display: none;
    flex: 1;
    flex-direction: column;
    border-top: 1px solid var(--border);
  }

  .panel.active { display: flex; }

  /* ── CHAT PANEL ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .msg-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: 1px solid var(--border-bright);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.bot .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: var(--green-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── CHAT INPUT ── */
  .chat-input-wrap {
    padding: 14px 16px 20px;
    background: rgba(12,28,34,0.8);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .chat-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .chat-textarea::placeholder { color: var(--text-muted); }
  .chat-textarea:focus { border-color: var(--border-bright); }

  .send-btn {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--glow);
  }

  .send-btn:active { transform: scale(0.94); }

  /* ── IMAGE PANEL ── */
  #img-panel {
    padding: 20px 16px;
    gap: 16px;
    overflow-y: auto;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .img-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .img-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 90px;
    line-height: 1.5;
  }

  .img-textarea::placeholder { color: var(--text-muted); }
  .img-textarea:focus { border-color: var(--border-bright); }

  .gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 20px var(--glow);
  }

  .gen-btn:active { transform: scale(0.97); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 2px;
  }

  /* 18+ section */
  .nsfw-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .nsfw-badge {
    background: rgba(180,30,30,0.2);
    border: 1px solid rgba(180,30,30,0.5);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: #f87171;
    letter-spacing: 1px;
  }

  .nsfw-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .nsfw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .nsfw-option {
    padding: 12px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .nsfw-option.selected {
    background: rgba(40,98,58,0.25);
    border-color: var(--border-bright);
    color: var(--text);
    box-shadow: 0 0 10px var(--glow);
  }

  .nsfw-option:active { transform: scale(0.96); }

  .nsfw-gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(180,30,30,0.5), rgba(100,15,15,0.6));
    border: 1px solid rgba(180,30,30,0.4);
    border-radius: 14px;
    color: #fca5a5;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .nsfw-gen-btn:active { transform: scale(0.97); }

  /* image result */
  .img-result {
    margin-top: 16px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
    flex-direction: column;
  }

  .img-result.show { display: flex; }

  .img-result img {
    width: 100%;
    display: block;
  }

  .img-result-bar {
    padding: 10px 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .img-result-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  .img-dl-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
  }

  /* loading bar */
  .loading-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--green), var(--green-light), var(--green));
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
    display: none;
  }

  .loading-bar.show { display: block; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── FOOTER ── */
  footer {
    padding: 16px 20px 24px;
    border-top: 1px solid var(--border);
    background: rgba(12,28,34,0.9);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-brand {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
  }

  .social-links {
    display: flex;
    gap: 12px;
  }

  .social-link {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.2s;
  }

  .social-link:active { transform: scale(0.92); }

  .social-link img {
    width: 18px;
    height: 18px;
    object-fit: contain;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15,32,39,0.95);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* welcome */
  .welcome-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px 20px;
    color: var(--text-muted);
    text-align: center;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .welcome-title {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 1px;
  }

  .welcome-sub {
    font-size: 13px;
    line-height: 1.6;
    max-width: 260px;
  }
  /* ── CODE BLOCKS ── */
  .code-block {
    margin: 8px 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(40,98,58,0.4);
    background: #0a1a20;
    font-size: 13px;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    background: rgba(40,98,58,0.2);
    border-bottom: 1px solid rgba(40,98,58,0.25);
  }

  .code-lang {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .code-copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    padding: 3px 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }

  .code-copy-btn:active, .code-copy-btn.copied {
    background: rgba(40,98,58,0.3);
    border-color: var(--border-bright);
    color: var(--text);
  }

  .code-block pre {
    margin: 0;
    padding: 14px;
    overflow-x: auto;
    line-height: 1.6;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .code-block code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #a8d5b5;
  }

  /* syntax colors */
  .tok-kw  { color: #79c0ff; }  /* keywords */
  .tok-str { color: #a5d6ff; }  /* strings */
  .tok-cmt { color: #4a7558; font-style: italic; }  /* comments */
  .tok-fn  { color: #d2a8ff; }  /* functions */
  .tok-num { color: #f2cc60; }  /* numbers */
  .tok-op  { color: #ff9e64; }  /* operators */

  /* ── MSG COPY BUTTON ── */
  .msg-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    padding: 0 2px;
  }

  .msg-action-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 0;
    transition: color 0.2s;
    letter-spacing: 0.5px;
  }

  .msg-action-btn:hover { color: var(--text-dim); }

  /* ── HISTORY SIDEBAR ── */
  #history-sidebar {
    position: fixed;
    top: 0; right: -100%;
    width: 85%;
    max-width: 340px;
    height: 100%;
    background: rgba(10,24,30,0.98);
    border-left: 1px solid var(--border);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transition: right 0.3s ease;
    backdrop-filter: blur(16px);
  }

  #history-sidebar.open { right: 0; }

  .history-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .history-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
  }

  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .history-item {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .history-item:active { background: var(--surface2); }

  .history-item-text {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-item-time {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .history-del {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
  }

  .history-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 40px 20px;
    font-family: 'Space Mono', monospace;
  }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
    display: none;
  }

  .sidebar-overlay.open { display: block; }

</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-microchip"></i>
      </div>
      <div class="logo-text">
        <span class="logo-name">ZedCore</span>
        <span class="logo-sub">Uncensored AI</span>
      </div>
    </div>
    <div class="status-badge" style="gap:10px">
      <span class="status-dot"></span>
      Online
      <span style="width:1px;height:14px;background:var(--border);display:inline-block"></span>
      <button onclick="newChat()" style="background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace" title="New Chat">
        <i class="fa-solid fa-plus"></i>
      </button>
      <button onclick="toggleHistory()" style="background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace" title="History">
        <i class="fa-solid fa-clock-rotate-left"></i>
      </button>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat')">
      <i class="fa-solid fa-comments"></i> Chat
    </button>
    <button class="tab" onclick="switchTab('image')">
      <i class="fa-solid fa-image"></i> Images
    </button>
  </div>

  <!-- CHAT PANEL -->
  <div class="panel active" id="chat-panel">
    <div id="chat-messages">
      <div class="welcome-msg">
        <div class="welcome-icon"><i class="fa-solid fa-robot"></i></div>
        <div class="welcome-title">ZedCore AI</div>
        <div class="welcome-sub">Uncensored, unfiltered. Ask me anything — no limits, no judgment.</div>
      </div>
    </div>
    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea
          class="chat-textarea"
          id="chat-input"
          placeholder="Message ZedCore..."
          rows="1"
          onInput="autoResize(this)"
          onKeyDown="handleKey(event)"
        ></textarea>
        <button class="send-btn" onclick="sendChat()">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>

  <!-- IMAGE PANEL -->
  <div class="panel" id="img-panel">

    <!-- Normal Image Gen -->
    <div>
      <div class="section-label"><i class="fa-solid fa-wand-magic-sparkles" style="margin-right:6px"></i>AI Image Generator</div>
      <div class="img-input-wrap">
        <textarea
          class="img-textarea"
          id="img-prompt"
          placeholder="Describe the image you want to generate..."
        ></textarea>
        <button class="gen-btn" onclick="generateImage()">
          <i class="fa-solid fa-image"></i> Generate Image
        </button>
        <div class="loading-bar" id="img-loading"></div>
      </div>
      <div class="img-result" id="img-result">
        <img id="img-output" src="" alt="Generated image">
        <div class="img-result-bar">

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">18+ Zone</div>
      <div class="divider-line"></div>
    </div>

    <!-- 18+ Section -->
    <div>
      <div class="nsfw-header">
        <div class="nsfw-badge">18+</div>
        <span class="nsfw-label">Adult Content Generator</span>
      </div>
      <div class="nsfw-grid">
        <button class="nsfw-option" data-cat="pussy" onclick="selectNsfw(this)">
          <i class="fa-solid fa-fire"></i> Pussy
        </button>
        <button class="nsfw-option" data-cat="blowjob" onclick="selectNsfw(this)">
          <i class="fa-solid fa-fire"></i> Blowjob
        </button>
        <button class="nsfw-option" data-cat="milf" onclick="selectNsfw(this)">
          <i class="fa-solid fa-fire"></i> MILF
        </button>
        <button class="nsfw-option" data-cat="cuckold" onclick="selectNsfw(this)">
          <i class="fa-solid fa-fire"></i> Cuckold
        </button>
      </div>
      <button class="nsfw-gen-btn" onclick="generateNsfw()">
        <i class="fa-solid fa-lock-open"></i> Generate 18+ Image
      </button>
      <div class="loading-bar" id="nsfw-loading" style="margin-top:10px"></div>
      <div class="img-result" id="nsfw-result" style="margin-top:12px">
        <img id="nsfw-output" src="" alt="18+ image">
        <div class="img-result-bar">
          <span class="img-result-label" style="color:#f87171">18+ Content</span>
          <button class="img-dl-btn" onclick="downloadNsfw()">
            <i class="fa-solid fa-download"></i>

  </div>

  <!-- FOOTER -->
  <footer>
    <span class="footer-brand">ZADE SYSTEMS © 2026</span>
    <div class="social-links">
      <a class="social-link" href="https://instagram.com/suspend.z" target="_blank" title="@suspend.z">
        <img src="https://img.icons8.com/fluency/48/instagram-new.png" alt="Instagram">
      </a>
      <a class="social-link" href="https://t.me/zade4everbot" target="_blank" title="@zade4everbot">

</div>

<!-- HISTORY SIDEBAR -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleHistory()"></div>
<div id="history-sidebar">
  <div class="history-header">
    <span class="history-title"><i class="fa-solid fa-clock-rotate-left" style="margin-right:8px"></i>Conversations</span>
    <button class="history-close" onclick="toggleHistory()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div id="history-list">
    <div class="history-empty">No conversations yet</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // Tab switch
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if (tab === 'chat') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('chat-panel').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('img-panel').classList.add('active');
    }
  }

  // ── HISTORY ──
  let conversations = JSON.parse(localStorage.getItem('zedcore_convos') || '[]');
  let currentConvo = null; // { id, title, messages: [{role,text}] }

  function saveConvo() {
    if (!currentConvo || currentConvo.messages.length === 0) return;
    const idx = conversations.findIndex(c => c.id === currentConvo.id);
    if (idx >= 0) conversations[idx] = currentConvo;
    else conversations.unshift(currentConvo);
    // keep max 30
    conversations = conversations.slice(0, 30);
    localStorage.setItem('zedcore_convos', JSON.stringify(conversations));
    renderHistoryList();
  }

  function renderHistoryList() {
    const list = document.getElementById('history-list');
    if (conversations.length === 0) {
      list.innerHTML = '<div class="history-empty">No conversations yet</div>';
      return;
    }
    list.innerHTML = conversations.map(c => `
      <div class="history-item" onclick="loadConvo('${c.id}')">
        <div style="flex:1;min-width:0">
          <div class="history-item-text">${escHtml(c.title)}</div>
          <div class="history-item-time">${c.time}</div>
        </div>
        <button class="history-del" onclick="event.stopPropagation();deleteConvo('${c.id}')">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    `).join('');
  }

  function deleteConvo(id) {
    conversations = conversations.filter(c => c.id !== id);
    localStorage.setItem('zedcore_convos', JSON.stringify(conversations));
    renderHistoryList();
  }

  function loadConvo(id) {
    const c = conversations.find(x => x.id === id);
    if (!c) return;
    currentConvo = JSON.parse(JSON.stringify(c));
    toggleHistory();
    const wrap = document.getElementById('chat-messages');
    wrap.innerHTML = '';
    document.querySelector('.welcome-msg') && document.querySelector('.welcome-msg').remove();
    c.messages.forEach(m => appendMsg(m.role, m.text, false));
    wrap.scrollTop = wrap.scrollHeight;
  }

  function newChat() {
    saveConvo();
    currentConvo = null;
    const wrap = document.getElementById('chat-messages');
    wrap.innerHTML = `
      <div class="welcome-msg">
        <div class="welcome-icon"><i class="fa-solid fa-robot"></i></div>
        <div class="welcome-title">ZedCore AI</div>
        <div class="welcome-sub">Uncensored, unfiltered. Ask me anything — no limits, no judgment.</div>
      </div>`;
  }

  function toggleHistory() {
    renderHistoryList();
    document.getElementById('history-sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }

  // ── HELPERS ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeStr() {
    const d = new Date();
    return d.toLocaleString('en-IN', { hour:'2-digit', minute:'2-digit', day:'numeric', month:'short' });
  }

  // ── CODE HIGHLIGHT ──
  const KEYWORDS = /\b(import|from|def|return|class|if|else|elif|for|while|in|not|and|or|is|None|True|False|try|except|with|as|pass|break|continue|lambda|yield|async|await|const|let|var|function|=>|new|this|typeof|instanceof|null|undefined|console|print|echo|int|str|list|dict|bool|float)\b/g;
  const STRINGS  = /(["'`])(?:(?!\1)[^\\]|\\.)*?\1/g;
  const COMMENTS = /(#.*$|\/\/.*$|\/\*[\s\S]*?\*\/)/gm;
  const NUMBERS  = /\b(\d+\.?\d*)\b/g;
  const FUNCS    = /\b([a-zA-Z_]\w*)\s*(?=\()/g;

  function highlight(code, lang) {
    let s = escHtml(code);
    // order matters — comments first, then strings, then rest
    s = s.replace(COMMENTS, m => `<span class="tok-cmt">${m}</span>`);
    s = s.replace(STRINGS,  m => `<span class="tok-str">${m}</span>`);
    s = s.replace(KEYWORDS, m => `<span class="tok-kw">${m}</span>`);
    s = s.replace(FUNCS,    m => `<span class="tok-fn">${m}</span>`);
    s = s.replace(NUMBERS,  m => `<span class="tok-num">${m}</span>`);
    return s;
  }

  const _codeStore = {};

  function buildCodeBlock(code, lang) {
    const id = 'cb-' + Math.random().toString(36).slice(2,8);
    const hi = highlight(code.trim(), lang);
    _codeStore[id] = code.trim();
    return `<div class="code-block">
      <div class="code-header">
        <span class="code-lang">${lang || 'code'}</span>
        <button class="code-copy-btn" id="${id}" onclick="copyCode(this)">
          <i class="fa-solid fa-copy"></i> Copy
        </button>
      </div>
      <pre><code>${hi}</code></pre>
    </div>`;
  }

  function copyCode(btn) {
    const text = _codeStore[btn.id] || '';
    const doIt = () => {
      btn.classList.add('copied');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy';
      }, 2000);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(doIt).catch(() => fallbackCopy(text, doIt));
    } else {
      fallbackCopy(text, doIt);
    }
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (cb) cb();
  }

  // ── MARKDOWN-LITE PARSER ──
  function parseMarkdown(text) {
    // Split by code fences
    const parts = text.split(/(```[\s\S]*?```)/g);
    return parts.map(part => {
      const fenceMatch = part.match(/^```(\w*)\n?([\s\S]*?)```$/);
      if (fenceMatch) {
        const lang = fenceMatch[1] || 'code';
        const code = fenceMatch[2];
        return buildCodeBlock(code, lang);
      }
      // inline code
      let p = part.replace(/`([^`]+)`/g, '<code style="background:rgba(40,98,58,0.2);padding:2px 6px;border-radius:4px;font-family:\'Space Mono\',monospace;font-size:12px">$1</code>');
      // bold
      p = p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      // newlines
      p = p.replace(/\n/g, '<br>');
      return p;
    }).join('');
  }

  // ── APPEND MESSAGE ──
  function appendMsg(role, text, animate = true) {
    const wrap = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const label = role === 'user'
      ? '<i class="fa-solid fa-user"></i> You'
      : '<i class="fa-solid fa-microchip"></i> ZedCore';

    div.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${role === 'bot' ? parseMarkdown(text) : escHtml(text).replace(/\n/g,'<br>')}</div>
      <div class="msg-actions">
        <button class="msg-action-btn" onclick="copyMsgText(this)">
          <i class="fa-regular fa-copy"></i> copy
        </button>
      </div>`;

    // Set text via property not attribute — no escaping issues
    div.querySelector('.msg-action-btn')._copyText = text;

    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return div;
  }

  function copyMsgText(btn) {
    const text = btn._copyText || '';
    const doIt = () => {
      btn.innerHTML = '<i class="fa-solid fa-check"></i> copied';
      setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> copy'; }, 2000);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(doIt).catch(() => fallbackCopy(text, doIt));
    } else {
      fallbackCopy(text, doIt);
    }
  }

  // ── TYPING INDICATOR ──
  let typingCounter = 0;
  function appendTyping() {
    const id = ++typingCounter;
    const wrap = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = `typing-${id}`;
    div.innerHTML = `
      <div class="msg-label"><i class="fa-solid fa-microchip"></i> ZedCore</div>
      <div class="typing-indicator"><span></span><span></span><span></span></div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(`typing-${id}`);
    if (el) el.remove();
  }

  // ── STREAMING TYPEWRITER ──
  async function streamText(container, fullText) {
    const wrap = document.getElementById('chat-messages');
    // Word-by-word streaming
    const words = fullText.split(' ');
    let built = '';
    for (let i = 0; i < words.length; i++) {
      built += (i > 0 ? ' ' : '') + words[i];
      container.innerHTML = parseMarkdown(built + (i < words.length - 1 ? ' ▍' : ''));
      wrap.scrollTop = wrap.scrollHeight;
      await new Promise(r => setTimeout(r, 28));
    }
    // Final render without cursor
    container.innerHTML = parseMarkdown(fullText);
    wrap.scrollTop = wrap.scrollHeight;
  }

  // ── SEND CHAT ──
  async function sendChat() {
    const input = document.getElementById('chat-input');
    const q = input.value.trim();
    if (!q) return;

    // Init convo if new
    if (!currentConvo) {
      currentConvo = {
        id: Date.now().toString(),
        title: q.slice(0, 40),
        time: timeStr(),
        messages: []
      };
    }

    currentConvo.messages.push({ role: 'user', text: q });

    // Remove welcome
    const welcome = document.querySelector('.welcome-msg');
    if (welcome) welcome.remove();

    appendMsg('user', q, false);
    input.value = '';
    input.style.height = 'auto';

    const typingId = appendTyping();

    try {
      const res = await fetch(`/api/proxy?type=chat&q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const reply = data.reply || data.response || data.message || data.text || JSON.stringify(data);

      removeTyping(typingId);

      // Build bot msg with streaming
      const wrap = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      const labelDiv = document.createElement('div');
      labelDiv.className = 'msg-label';
      labelDiv.innerHTML = '<i class="fa-solid fa-microchip"></i> ZedCore';
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'msg-actions';
      div.appendChild(labelDiv);
      div.appendChild(bubble);
      div.appendChild(actionsDiv);
      wrap.appendChild(div);

      await streamText(bubble, reply);

      actionsDiv.innerHTML = `<button class="msg-action-btn" onclick="copyMsgText(this)">
        <i class="fa-regular fa-copy"></i> copy
      </button>`;
      actionsDiv.querySelector('.msg-action-btn')._copyText = reply;

      currentConvo.messages.push({ role: 'bot', text: reply });
      saveConvo();

    } catch (err) {
      removeTyping(typingId);
      appendMsg('bot', 'Connection error. Please try again.', false);
    }
  }

  // ── AUTO RESIZE ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  }

  // IMAGE GEN
  async function generateImage() {
    const prompt = document.getElementById('img-prompt').value.trim();
    if (!prompt) { showToast('Enter a prompt first'); return; }

    const loading = document.getElementById('img-loading');
    const result = document.getElementById('img-result');
    const output = document.getElementById('img-output');

    loading.classList.add('show');
    result.classList.remove('show');
    output.src = '';

    output.onload = () => {
      loading.classList.remove('show');
      result.classList.add('show');
    };
    output.onerror = () => {
      loading.classList.remove('show');
      showToast('Generation failed');
    };

    // Proxy streams image bytes directly — just set src
    output.src = `/api/proxy?type=dalle&q=${encodeURIComponent(prompt)}&t=${Date.now()}`;
  }

  // NSFW
  let selectedNsfw = null;

  function selectNsfw(btn) {
    document.querySelectorAll('.nsfw-option').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedNsfw = btn.dataset.cat;
  }

  async function generateNsfw() {
    if (!selectedNsfw) { showToast('Select a category first'); return; }

    const loading = document.getElementById('nsfw-loading');
    const result = document.getElementById('nsfw-result');
    const output = document.getElementById('nsfw-output');

    loading.classList.add('show');
    result.classList.remove('show');
    output.src = '';

    output.onload = () => {
      loading.classList.remove('show');
      result.classList.add('show');
    };
    output.onerror = () => {
      loading.classList.remove('show');
      showToast('Generation failed');
    };

    // Proxy streams image bytes directly — just set src
    output.src = `/api/proxy?type=nsfw_${selectedNsfw}&t=${Date.now()}`;
  }

  function downloadImg() {
    const src = document.getElementById('img-output').src;
    if (!src) return;
    const a = document.createElement('a');
    a.href = src; a.download = 'zedcore-image.jpg'; a.click();
  }

  function downloadNsfw() {
    const src = document.getElementById('nsfw-output').src;
    if (!src) return;
    const a = document.createElement('a');
    a.href = src; a.download = 'zedcore-18+.jpg'; a.click();
  }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
