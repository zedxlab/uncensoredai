<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZedCore — Uncensored AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0F2027;
    --mid: #1a3040;
    --green: #28623A;
    --green-light: #3a7a4e;
    --green-dim: #1e4a2c;
    --bg: #0c1c22;
    --surface: rgba(15,32,39,0.85);
    --surface2: rgba(40,98,58,0.15);
    --text: #d4ead9;
    --text-dim: #7aab87;
    --text-muted: #4a7558;
    --border: rgba(40,98,58,0.35);
    --border-bright: rgba(40,98,58,0.7);
    --glow: rgba(40,98,58,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* bg texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(40,98,58,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(15,32,39,0.9) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* subtle grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(40,98,58,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(40,98,58,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(12,28,34,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--green), var(--dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border-bright);
    box-shadow: 0 0 12px var(--glow);
  }

  .logo-icon i {
    color: var(--text);
    font-size: 16px;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-name {
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 14px 20px 0;
    gap: 8px;
    background: rgba(12,28,34,0.6);
  }

  .tab {
    flex: 1;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .tab.active {
    background: var(--surface2);
    border-color: var(--border-bright);
    color: var(--text);
  }

  .tab i { font-size: 13px; }

  /* ── PANELS ── */
  .panel {
    display: none;
    flex: 1;
    flex-direction: column;
    border-top: 1px solid var(--border);
  }

  .panel.active { display: flex; }

  /* ── CHAT PANEL ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .msg-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: 1px solid var(--border-bright);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.bot .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: var(--green-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── CHAT INPUT ── */
  .chat-input-wrap {
    padding: 14px 16px 20px;
    background: rgba(12,28,34,0.8);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .chat-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .chat-textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .chat-textarea::placeholder { color: var(--text-muted); }
  .chat-textarea:focus { border-color: var(--border-bright); }

  .send-btn {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--glow);
  }

  .send-btn:active { transform: scale(0.94); }

  /* ── IMAGE PANEL ── */
  #img-panel {
    padding: 20px 16px;
    gap: 16px;
    overflow-y: auto;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .img-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .img-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 90px;
    line-height: 1.5;
  }

  .img-textarea::placeholder { color: var(--text-muted); }
  .img-textarea:focus { border-color: var(--border-bright); }

  .gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 20px var(--glow);
  }

  .gen-btn:active { transform: scale(0.97); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 2px;
  }

  /* 18+ section */
  .nsfw-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .nsfw-badge {
    background: rgba(180,30,30,0.2);
    border: 1px solid rgba(180,30,30,0.5);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: #f87171;
    letter-spacing: 1px;
  }

  .nsfw-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .nsfw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .nsfw-option {
    padding: 12px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .nsfw-option.selected {
    background: rgba(40,98,58,0.25);
    border-color: var(--border-bright);
    color: var(--text);
    box-shadow: 0 0 10px var(--glow);
  }

  .nsfw-option:active { transform: scale(0.96); }

  .nsfw-gen-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(180,30,30,0.5), rgba(100,15,15,0.6));
    border: 1px solid rgba(180,30,30,0.4);
    border-radius: 14px;
    color: #fca5a5;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .nsfw-gen-btn:active { transform: scale(0.97); }

  /* image result */
  .img-result {
    margin-top: 16px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
    flex-direction: column;
  }

  .img-result.show { display: flex; }

  .img-result img {
    width: 100%;
    display: block;
  }

  .img-result-bar {
    padding: 10px 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .img-result-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  .img-dl-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
  }

  /* loading bar */
  .loading-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--green), var(--green-light), var(--green));
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
    display: none;
  }

  .loading-bar.show { display: block; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── FOOTER ── */
  footer {
    padding: 16px 20px 24px;
    border-top: 1px solid var(--border);
    background: rgba(12,28,34,0.9);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-brand {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
  }

  .social-links {
    display: flex;
    gap: 12px;
  }

  .social-link {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.2s;
  }

  .social-link:active { transform: scale(0.92); }

  .social-link img {
    width: 18px;
    height: 18px;
    object-fit: contain;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15,32,39,0.95);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* welcome */
  .welcome-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px 20px;
    color: var(--text-muted);
    text-align: center;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .welcome-title {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 1px;
  }

  .welcome-sub {
    font-size: 13px;
    line-height: 1.6;
    max-width: 260px;
  }
</style>
</head>

<script>
  // Tab switch
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    if (tab === 'chat') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('chat-panel').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('img-panel').classList.add('active');
    }
  }

  // Auto resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  }

  // CHAT
  let chatHistory = [];

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const q = input.value.trim();
    if (!q) return;

    appendMsg('user', q);
    input.value = '';
    input.style.height = 'auto';

    // Remove welcome if present
    const welcome = document.querySelector('.welcome-msg');
    if (welcome) welcome.remove();

    const typingId = appendTyping();

    try {
      const encoded = encodeURIComponent(q);
      const res = await fetch(`/api/proxy?type=chat&q=${encoded}`);
      const data = await res.json();
      const reply = data.reply || data.response || data.message || data.text || JSON.stringify(data);
      removeTyping(typingId);
      appendMsg('bot', reply);
    } catch (err) {
      removeTyping(typingId);
      appendMsg('bot', 'Connection error. Please try again.');
    }
  }

  function appendMsg(role, text) {
    const wrap = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = role === 'user'
      ? '<i class="fa-solid fa-user"></i> You'
      : '<i class="fa-solid fa-robot"></i> ZedCore';
    div.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  let typingCounter = 0;
  function appendTyping() {
    const id = ++typingCounter;
    const wrap = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = `typing-${id}`;
    div.innerHTML = `
      <div class="msg-label"><i class="fa-solid fa-robot"></i> ZedCore</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    `;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(`typing-${id}`);
    if (el) el.remove();
  }

  // IMAGE GEN
  async function generateImage() {
    const prompt = document.getElementById('img-prompt').value.trim();
    if (!prompt) { showToast('Enter a prompt first'); return; }

    const loading = document.getElementById('img-loading');
    const result = document.getElementById('img-result');
    const output = document.getElementById('img-output');

    loading.classList.add('show');
    result.classList.remove('show');

    try {
      const url = `/api/proxy?type=dalle&q=${encodeURIComponent(prompt)}`;
      const res = await fetch(url);
      const data = await res.json();
      const imgUrl = data.imageUrl || data.image || data.url || data.result;

      if (!imgUrl) throw new Error('No image URL');

      output.src = imgUrl;
      output.onload = () => {
        loading.classList.remove('show');
        result.classList.add('show');
      };
      output.onerror = () => {
        loading.classList.remove('show');
        showToast('Image load failed');
      };
    } catch (err) {
      loading.classList.remove('show');
      showToast('Generation failed');
    }
  }

  // NSFW
  let selectedNsfw = null;

  function selectNsfw(btn) {
    document.querySelectorAll('.nsfw-option').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedNsfw = btn.dataset.cat;
  }

  async function generateNsfw() {
    if (!selectedNsfw) { showToast('Select a category first'); return; }

    const loading = document.getElementById('nsfw-loading');
    const result = document.getElementById('nsfw-result');
    const output = document.getElementById('nsfw-output');

    loading.classList.add('show');
    result.classList.remove('show');

    try {
      const url = `/api/proxy?type=nsfw_${selectedNsfw}`;
      const res = await fetch(url);
      const data = await res.json();
      const imgUrl = data.imageUrl || data.url || data.image || data.link || data.result;

      if (!imgUrl) throw new Error('No image');

      output.src = imgUrl;
      output.onload = () => {
        loading.classList.remove('show');
        result.classList.add('show');
      };
      output.onerror = () => {
        loading.classList.remove('show');
        showToast('Image load failed');
      };
    } catch (err) {
      loading.classList.remove('show');
      showToast('Generation failed');
    }
  }

  function downloadImg() {
    const src = document.getElementById('img-output').src;
    if (!src) return;
    const a = document.createElement('a');
    a.href = src; a.download = 'zedcore-image.jpg'; a.click();
  }

  function downloadNsfw() {
    const src = document.getElementById('nsfw-output').src;
    if (!src) return;
    const a = document.createElement('a');
    a.href = src; a.download = 'zedcore-18+.jpg'; a.click();
  }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
